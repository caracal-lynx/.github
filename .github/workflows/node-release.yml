name: Node Release

# Reusable release workflow for Caracal Lynx TypeScript/Node packages.
# Implements the Changesets PR-flow: push to main/master either opens
# a "Version Packages" PR, or — when that PR merges — publishes to npm
# via Trusted Publishing (OIDC, no NPM_TOKEN).
#
# Linear release sync (linear-release-action) is wired separately per
# consumer once DAG-58 (beta access) lands.
#
# Action-pinning policy (DAG-78):
#   - Third-party actions (pnpm/action-setup, changesets/action) are pinned to a
#     full commit SHA with a `# vX.Y.Z` comment — defends against tag re-pointing;
#     Renovate reads the comment as the version hint and bumps both together.
#   - First-party actions/* (checkout, setup-node, create-github-app-token) are
#     GitHub-owned and kept on the major-version tag, Renovate-bumped weekly.

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version (matches package.json engines.node lower bound)
        type: string
        default: "24.16.0"
      package-manager:
        description: Package manager — "npm" or "pnpm"
        type: string
        default: npm
      run-build:
        description: Run the build step before publishing. Set false for pure-config packages with no build/dist step. Tests always run. Mirrors node-ci's run-build (DAG-158).
        type: boolean
        default: true
      provenance:
        description: Emit npm provenance attestation. MUST be false for packages with publishConfig.access=restricted (npm rejects provenance on private packages and it would leak metadata to the public sigstore log).
        type: boolean
        default: true
      npm-read-auth:
        description: "DEPRECATED / no-op (DAG-162). Read auth is now always on: NODE_AUTH_TOKEN is supplied to every install/precheck step from the inherited NPM_READ_TOKEN, mirroring node-ci. Empty and harmless when the org has no such secret; the publish itself still uses OIDC Trusted Publishing. Retained only so existing callers that pass `npm-read-auth: true` don't break — safe to drop from your release.yml. See DAG-156 for the original rationale."
        type: boolean
        default: false
      release-commit-message:
        description: Commit message used by the changesets PR (house style is `[master] - ...`)
        type: string
        default: "[master] - chore(release): version packages"
      release-pr-title:
        description: Title of the auto-created release PR
        type: string
        default: "chore(release): version packages"

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Check App token prerequisites
        id: preflight
        shell: bash
        run: |
          if [[ -n "$APP_ID" && -n "$PRIVATE_KEY" ]]; then
            echo "use_app_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_app_token=false" >> "$GITHUB_OUTPUT"
            echo "::warning::RELEASER_APP_ID or RELEASER_PRIVATE_KEY not configured — falling back to GITHUB_TOKEN. Release PRs may require manual approval before CI can run on them."
          fi
        env:
          APP_ID: ${{ vars.RELEASER_APP_ID }}
          PRIVATE_KEY: ${{ secrets.RELEASER_PRIVATE_KEY }}

      - name: Mint caracal-lynx-releaser App token
        id: app-token
        if: steps.preflight.outputs.use_app_token == 'true'
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0      # required: changesets walks git history
          token: ${{ steps.app-token.outputs.token || github.token }}

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        if: inputs.package-manager == 'pnpm'

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: ${{ inputs.package-manager == 'pnpm' && 'pnpm install --frozen-lockfile' || 'npm ci' }}
        env:
          # Authenticate installs so restricted @caracal-lynx/* deps resolve: pnpm's
          # minimumReleaseAge check does a registry GET that 404s unauthenticated and
          # fails the release. Unconditional, mirroring node-ci — empty/harmless when
          # the org has no NPM_READ_TOKEN. This was the DAG-162 release-only 404.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_READ_TOKEN }}

      - name: Build
        if: ${{ inputs.run-build }}
        run: ${{ inputs.package-manager == 'pnpm' && 'pnpm build' || 'npm run build' }}

      - name: Test
        run: ${{ inputs.package-manager == 'pnpm' && 'pnpm test' || 'npm test' }}

      - name: Create release PR or publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          # Use `pnpm run <script>`, not `pnpm <script>`: `version` is a built-in
          # pnpm command (bump-the-version, needs a semver arg) so bare `pnpm version`
          # fails with ERR_PNPM_INVALID_VERSION_BUMP and never runs the package script.
          # `release` is not reserved, but keep it symmetric for safety.
          publish: ${{ inputs.package-manager == 'pnpm' && 'pnpm run release' || 'npm run release' }}
          version: ${{ inputs.package-manager == 'pnpm' && 'pnpm run version' || 'npm run version' }}
          commit: ${{ inputs.release-commit-message }}
          title: ${{ inputs.release-pr-title }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          NPM_CONFIG_PROVENANCE: ${{ inputs.provenance }}
          # A READ token so changesets' `npm info` precheck can see existing versions
          # of a restricted package (unauthenticated reads 404 → changesets thinks the
          # version is unpublished and crashes). Unconditional, mirroring node-ci; empty
          # and harmless for public packages. This is NOT publish auth — npm prefers OIDC
          # Trusted Publishing over a configured token, so the publish still goes via
          # OIDC. See DAG-156, DAG-162.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_READ_TOKEN }}
          # Publish authentication via npm Trusted Publishing (OIDC).
          # NO publish NPM_TOKEN — Classic Automation tokens were retired in Nov 2025;
          # Trusted Publishing is the recommended path for CI publishing.
          # Each package must configure Trusted Publishers at
          # npmjs.com/package/<name>/access to authorise this workflow by
          # org + repo + filename. The `id-token: write` permission above
          # provides the OIDC token at publish time.
