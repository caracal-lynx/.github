name: Node CI

# Reusable CI workflow for Caracal Lynx TypeScript/Node packages.
# Consumer-facing inputs are documented below; see ../../README.md for usage.

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version (matches package.json engines.node lower bound)
        type: string
        default: "24.16.0"
      os-matrix:
        description: JSON array of runner OS labels for the test matrix
        type: string
        default: '["ubuntu-latest", "windows-latest"]'
      package-manager:
        description: Package manager — "npm" or "pnpm"
        type: string
        default: npm
      coverage:
        description: Generate coverage report (uploads as artifact)
        type: boolean
        default: false
      run-build:
        description: Run the build job. Set false for config-driven app repos with no build/dist step.
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        if: inputs.package-manager == 'pnpm'
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - name: Install dependencies
        run: ${{ inputs.package-manager == 'pnpm' && 'pnpm install --frozen-lockfile' || 'npm ci' }}
      - name: Run lint
        run: ${{ inputs.package-manager == 'pnpm' && 'pnpm lint' || 'npm run lint' }}

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        if: inputs.package-manager == 'pnpm'
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - name: Install dependencies
        run: ${{ inputs.package-manager == 'pnpm' && 'pnpm install --frozen-lockfile' || 'npm ci' }}
      - name: Run typecheck
        run: ${{ inputs.package-manager == 'pnpm' && 'pnpm typecheck' || 'npm run typecheck' }}

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.os-matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        if: inputs.package-manager == 'pnpm'
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - name: Install dependencies
        run: ${{ inputs.package-manager == 'pnpm' && 'pnpm install --frozen-lockfile' || 'npm ci' }}
      - name: Run tests
        run: ${{ inputs.coverage && (inputs.package-manager == 'pnpm' && 'pnpm test:cov' || 'npm run test:cov') || (inputs.package-manager == 'pnpm' && 'pnpm test' || 'npm test') }}
      - name: Upload coverage
        if: inputs.coverage && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/

  build:
    name: Build
    if: ${{ inputs.run-build }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        if: inputs.package-manager == 'pnpm'
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - name: Install dependencies
        run: ${{ inputs.package-manager == 'pnpm' && 'pnpm install --frozen-lockfile' || 'npm ci' }}
      - name: Build
        run: ${{ inputs.package-manager == 'pnpm' && 'pnpm build' || 'npm run build' }}
      - name: Assert dist is non-empty
        shell: bash
        run: |
          if [ ! -d dist ] || [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "::error::dist/ is empty or missing after build"
            exit 1
          fi
          echo "dist/ contents: $(find dist -type f | wc -l) files"

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        if: inputs.package-manager == 'pnpm'
      # No cache on this job: it runs only `audit` (no install), so there is no
      # package-manager store to cache. With pnpm the setup-node cache-save step
      # then errors on a cold store ("Path Validation Error") and fails the job.
      # See DAG-141.
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
      - name: npm audit — production dependencies (blocking)
        run: ${{ inputs.package-manager == 'pnpm' && 'pnpm audit --prod --audit-level=high' || 'npm audit --omit=dev --audit-level=high' }}
      - name: npm audit — full dependency tree (report-only, non-blocking)
        # Dev/build-tool CVEs are surfaced here for visibility (and tracked by
        # Renovate vulnerabilityAlerts) but do NOT block releases — only vulns
        # in shipped/production deps gate. See DAG-67.
        if: always()
        run: ${{ inputs.package-manager == 'pnpm' && 'pnpm audit --audit-level=high || true' || 'npm audit --audit-level=high || true' }}

  ci-success:
    name: CI success
    # Single stable status check for branch-protection rulesets: green only when
    # every CI job above succeeded. Lets org rulesets require one context
    # ("ci / CI success") instead of brittle per-job/matrix names. See DAG-67.
    if: always()
    needs: [lint, typecheck, test, build, security]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job did not succeed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
