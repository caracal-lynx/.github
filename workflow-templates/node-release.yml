name: Release

# Starter for the org-wide reusable Node release workflow (caracal-lynx/.github).
# Defaults to a PRIVATE (publishConfig.access=restricted) package — the org norm.
#
# For a PUBLIC package, drop the `provenance: false` line below — provenance then
# defaults to true (npm provenance attestation). Registry read auth is always on
# (DAG-162), so there is nothing to toggle for private packages.
#
# NB: a restricted package needs a one-time bootstrap publish + GitHub Actions
# Trusted Publisher before this workflow can publish. See DAG-157.

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    uses: caracal-lynx/.github/.github/workflows/node-release.yml@v1.11.0
    with:
      node-version: "24.16.0"
      package-manager: pnpm
      provenance: false   # restricted: npm rejects provenance on private packages
    secrets: inherit
